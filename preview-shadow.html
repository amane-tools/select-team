<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>商品セレクト｜影テストプレビュー</title>
<style>
:root{--bg:#f4f6fa;--card:#fff;--ink:#172033;--muted:#667085;--line:#dfe5ef;--blue:#2864d7;--blue-bg:#eaf1ff;--green:#138a5b;--green-bg:#e9f8f0;--amber:#a96e00;--amber-bg:#fff5df}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;line-height:1.5}.shell{max-width:1180px;margin:auto;padding:24px 20px 56px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}.brand{font-weight:800;font-size:21px;display:flex;gap:9px;align-items:center}.logo{display:grid;place-items:center;width:32px;height:32px;border-radius:50%;background:#172033;color:#fff}.meta{font-size:12px;color:var(--muted);text-align:right}.notice{border:1px solid #bbcef9;background:#edf3ff;border-radius:14px;padding:14px 16px;margin-bottom:18px}.notice strong{color:var(--blue)}.notice small{display:block;color:var(--muted);margin-top:3px}.layout{display:grid;grid-template-columns:290px 1fr;gap:18px}.panel,.main{background:var(--card);border:1px solid var(--line);border-radius:16px}.panel{padding:16px;height:max-content}.panel h2{font-size:14px;color:var(--muted);margin:0 0 12px}.angle{width:100%;text-align:left;border:1px solid transparent;background:transparent;border-radius:12px;padding:13px 12px;margin:4px 0;cursor:pointer;color:var(--ink)}.angle:hover{background:#f7f9fd}.angle.active{background:var(--blue-bg);border-color:#80a7f4}.angle .line{display:flex;justify-content:space-between;gap:8px;align-items:center;font-weight:700}.angle .desc{font-size:12px;color:var(--muted);margin-top:4px}.pill{font-size:11px;border-radius:10px;padding:2px 7px;white-space:nowrap}.ready{background:var(--green-bg);color:var(--green)}.hold{background:var(--amber-bg);color:var(--amber)}.main{padding:20px}.mainhead{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:16px}.eyebrow{font-size:12px;color:var(--muted)}h1{font-size:22px;line-height:1.35;margin:4px 0 5px}.kw{font-size:12px;color:var(--muted)}.summary{font-size:12px;text-align:right;color:var(--muted);white-space:nowrap}.summary b{display:block;font-size:22px;color:var(--green)}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.product{border:1px solid var(--line);border-radius:13px;padding:11px;background:#fff;display:flex;flex-direction:column;min-width:0}.photo{height:150px;border-radius:9px;background:#f2f5f9;display:grid;place-items:center;overflow:hidden;margin-bottom:9px}.photo img{width:100%;height:100%;object-fit:contain}.fallback{font-size:34px;display:none}.rank{font-size:11px;color:var(--muted);display:flex;justify-content:space-between;gap:5px}.score{font-size:12px;font-weight:800;color:var(--green)}.product h3{font-size:14px;line-height:1.4;margin:6px 0 4px}.asin{font-size:11px;color:var(--muted)}.reason{border-top:1px solid var(--line);font-size:12px;color:#536078;margin-top:9px;padding-top:8px;flex:1}.chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}.chip{font-size:10px;border-radius:9px;padding:2px 6px;background:#f1f4f8;color:#5b6678}.foot{margin-top:18px;padding-top:14px;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}@media(max-width:860px){.layout{grid-template-columns:1fr}.panel{display:flex;gap:8px;overflow:auto}.panel h2{display:none}.angle{min-width:240px}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:560px){.shell{padding:16px 11px}.meta{display:none}.mainhead{display:block}.summary{text-align:left;margin-top:8px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">
<div class="top"><div class="brand"><span class="logo">S.</span>商品セレクト</div><div class="meta">確認用プレビュー<br>Actions #154・2026-07-24</div></div>
<div class="notice"><strong>影テスト結果の確認画面</strong>　このページの商品はDBに保存されていません。<small>AI適合度・候補数・保留理由を、本番に近いカード表示で確認するためのプレビューです。</small></div>
<div class="layout"><aside class="panel"><h2>今回テストした切り口</h2><div id="angles"></div></aside><main class="main"><div class="mainhead"><div><div class="eyebrow" id="kind"></div><h1 id="title"></h1><div class="kw" id="kw"></div></div><div class="summary"><b id="count"></b><span id="status"></span></div></div><div class="grid" id="products"></div><div class="foot">判定の考え方：AIスコアを主軸にし、最低点が80点未満・候補5件未満の切り口は正式反映を保留。9件を埋めるための低評価商品は追加しません。<br>※Amazonの星評価・評価件数は今回の影テストではAPIから取得できないため表示していません。</div></main></div>
</div>
<script>
const A=[
{id:'pet',kind:'季節・タイムリー',title:'夏の室内向けのペット冷感グッズ（ひんやりで選ぶ）',theme:'ペット冷感グッズ',kw:'ペット冷感グッズ ひんやり',status:'正式反映候補（影テストのみ）',products:[
['B0GV6KLRH7','MechCore','【テレビで紹介！】ペット ひんやりマット 犬 猫 冷感ジェルマット','95','犬猫向け冷感マットで用途に一致','🧊'],['B0GGZS347D','FUWAPET','ペットひんやりマット 犬 猫 冷感ジェルマット 夏用','95','犬猫・冷感・夏用が明記','❄️'],['B0DZSTSYWQ','UNIMDISE','ペット用クールブランケット 犬猫用 冷感グッズ','95','冷感ブランケットで室内利用に一致','🐾'],['B0GWZBZLC1','WATSHINE','ペットひんやりマット 犬 猫 冷感ジェルマット','95','冷却・洗濯・折りたたみの説明が具体的','🧊'],['B0C6Q7368X','YFFSFDC','ペットひんやりマット 犬 猫 40×50cm','95','ペット用冷却マットで直接一致','❄️'],['B0GV3NMCHX','AUPETEK','ペット用クールマット 犬 猫 冷感グッズ','95','犬猫用・冷感・夏向けが明確','🐶']
]},
{id:'bath',kind:'通常',title:'風呂向けの掃除グッズ（すき間で選ぶ）',theme:'掃除グッズ',kw:'掃除グッズ すき間',status:'正式反映保留（最低AI75点）',products:[
['B0FW4K2J5F','マーナ(Marna)','すき間や溝が洗いやすいバスブラシ','90','すき間・溝・浴室用途が具体的','🧹'],['B0DJFR1366','TOFFY','マグネット隙間ブラシ 浴槽・タイル・すき間','90','浴槽・タイルのすき間掃除に一致','🧽'],['B0BJCJGWPK','アズマ工業','スマート 浴室スミズミブラシ マグネット収納','90','排水溝・ドアレール・タイル目地に対応','🧹'],['B0CWYSTFB8','spoil','すきま爽快 掃除 溝ブラシ（2本セット）','85','家中のすき間掃除。風呂にも利用可能','🧽'],['B0CQNK583V','激落ちくん','すき間・レールブラシ 浴室用','85','浴室・レールのすき間向け','🧹'],['B0968C2HV4','スリーエム(3M)','お風呂掃除ブラシ コンパクト 抗菌','75','浴室用だが、すき間特化が弱く保留','⚠️']
]},
{id:'pillow',kind:'通常',title:'買い替え向けの枕（高さで選ぶ）',theme:'枕',kw:'枕 高さ',status:'正式反映保留（3件・5件未満）',products:[
['B0GVH7BR15','RecreLife+','あなたの高さが見つかる枕 高さ調整14通り','100','高さ調整14通りで買い替えの高さ軸に一致','🛏️'],['B0G3WRXS78','GOKUMIN','低反発枕 高さ調整 横向き寝対応','95','高さ調整と横向き対応が具体的','🛏️'],['B09LTRSJN3','Reowide','高反発シート 高さ調整シート 枕','85','後から高さ調整できるが候補数不足','🛏️']
]}
];
let current=A[0];const angles=document.querySelector('#angles'),products=document.querySelector('#products');
function image(asin,emoji){return '<img src="https://images-na.ssl-images-amazon.com/images/P/'+asin+'.01.L.jpg" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'">'+'<span class="fallback">'+emoji+'</span>'}
function drawAngles(){angles.innerHTML=A.map(x=>'<button class="angle '+(x.id===current.id?'active':'')+'" data-id="'+x.id+'"><div class="line"><span>'+x.theme+'</span><span class="pill '+(x.status.includes('正式反映候補')?'ready':'hold')+'">'+x.products.length+'件</span></div><div class="desc">'+x.title+'</div></button>').join('');angles.querySelectorAll('.angle').forEach(b=>b.onclick=()=>{current=A.find(x=>x.id===b.dataset.id);drawAngles();drawProducts()})}
function drawProducts(){document.querySelector('#kind').textContent=current.kind;document.querySelector('#title').textContent=current.title;document.querySelector('#kw').textContent='検索キーワード：'+current.kw;document.querySelector('#count').textContent=current.products.length+'件';document.querySelector('#status').textContent=current.status;products.innerHTML=current.products.map((p,i)=>'<article class="product"><div class="photo">'+image(p[0],p[5])+'</div><div class="rank"><span>#'+(i+1)+'　'+p[1]+'</span><span class="score">AI適合 '+p[3]+'</span></div><h3>'+p[2]+'</h3><div class="asin">Amazon　ASIN '+p[0]+'</div><div class="reason">'+p[4]+'</div><div class="chips"><span class="chip">影テスト</span><span class="chip">DB未保存</span></div></article>').join('')}
drawAngles();drawProducts();
</script>
</body>
</html>
