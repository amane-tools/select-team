<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select. — 商品ビュー（係②）</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Ccircle%20cx='16'%20cy='16'%20r='16'%20fill='%231a2236'/%3E%3Ctext%20x='14.5'%20y='21'%20text-anchor='middle'%20font-family='Arial'%20font-size='17'%20font-weight='bold'%20fill='%23fff'%3ES%3C/text%3E%3Ccircle%20cx='23.5'%20cy='19'%20r='2.3'%20fill='%233b6fe0'/%3E%3C/svg%3E">
<style>
  :root{
    --bg:#f5f7fb;--panel:#fff;--ink:#1a2236;--ink-soft:#5b6577;--ink-faint:#98a1b3;
    --line:#e4e9f2;--blue:#3b6fe0;--blue-soft:#eaf0fd;--blue-deep:#2a55b8;
    --green:#1f9d6b;--green-soft:#e6f6ee;--green-line:#c7e8d6;
    --amber:#c9871f;--amber-soft:#fbf2dd;--red:#d24a52;--red-soft:#fbe9ea;
    --purple:#7b5bd6;--purple-soft:#efeafb;--teal:#0f9c8f;--teal-soft:#e2f5f3;
    --gray2:#8a92a3;--gray-soft:#f0f2f6;--gold:#d9a441;--gold-soft:#faf3e0;
    --shadow:0 1px 2px rgba(26,34,54,.04),0 8px 24px rgba(26,34,54,.06);--radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Segoe UI",sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;padding:26px 18px 96px}
  .wrap{max-width:1060px;margin:0 auto}
  .topbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .brand{display:inline-flex;align-items:baseline;gap:2px;font-size:20px;font-weight:700;letter-spacing:-.02em}
  .brand .dot{color:var(--blue)}
  .logomark{width:30px;height:30px;border-radius:50%;background:var(--ink);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700;flex-shrink:0}
  .logomark .d{color:var(--blue)}
  .date{font-size:12px;color:var(--ink-soft);font-weight:600;background:var(--panel);border:1px solid var(--line);border-radius:100px;padding:4px 11px;white-space:nowrap}.date b{color:var(--ink)}
  .userchip{margin-left:auto;display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--ink-soft)}
  .rolebadge{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:100px}
  .rolebadge.admin{background:var(--purple-soft);color:var(--purple)} .rolebadge.worker{background:var(--blue-soft);color:var(--blue-deep)}
  .userchip button{background:var(--gray-soft);border:1px solid var(--line);border-radius:8px;padding:5px 10px;font-size:11px;cursor:pointer;color:var(--ink-soft)}
  h1{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-top:6px}
  .lead{color:var(--ink-soft);margin-top:6px;max-width:760px;font-size:14px}
  .controls{display:flex;align-items:center;gap:11px;flex-wrap:wrap;margin:16px 0 10px}
  .tabs{display:inline-flex;gap:4px;background:var(--gray-soft);border:1px solid var(--line);border-radius:12px;padding:4px}
  .tab{border:none;background:transparent;font-size:13px;font-weight:700;color:var(--ink-soft);padding:8px 15px;border-radius:9px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .tab.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
  .tab .tb{font-size:11px;font-weight:700;padding:1px 7px;border-radius:100px;background:var(--gray-soft);color:var(--ink-soft)}
  .tab.on .tb{background:var(--gray-soft)}
  .tab[data-v="pending"] .tb{background:var(--amber-soft);color:var(--amber)}
  .tab[data-v="approved"] .tb{background:var(--green-soft);color:var(--green)}
  button.reload{background:var(--blue-soft);color:var(--blue-deep);border:1px solid #cfe0fb;font-size:13px;font-weight:600;padding:9px 16px;border-radius:10px;cursor:pointer}
  button.reload:hover{background:#dfeafd}
  .counter{margin-left:auto;display:inline-flex;gap:8px;flex-wrap:wrap}
  .cpill{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:6px 12px;font-size:12px;color:var(--ink-soft);white-space:nowrap}
  .cpill b{color:var(--ink);font-size:15px;font-weight:700;margin-left:3px}

  .theme-sec{margin:18px 0 8px;opacity:0;animation:rise .4s forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  .theme-head{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:700;letter-spacing:-.01em;margin-bottom:2px}
  .theme-head .thn{font-size:11px;font-weight:600;color:var(--ink-faint)}
  .angle-sec{margin:14px 0 6px}
  .angle-head{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--ink-soft);margin:0 0 10px;flex-wrap:wrap}
  .angle-head .pip{width:7px;height:7px;border-radius:2px;background:var(--blue)}
  .angle-head .cnt{font-size:11px;font-weight:600;color:var(--ink-faint)}

  .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  @media(max-width:720px){.pgrid{grid-template-columns:1fr}}
  .pcard{display:flex;gap:12px;border:2px solid var(--line);border-radius:12px;padding:12px;background:var(--panel);box-shadow:var(--shadow);opacity:0;animation:rise .3s forwards;position:relative;transition:border-color .12s,background .12s}
  .pcard.selectable{cursor:pointer}
  .pcard.selectable:hover{border-color:#cfe0fb}
  .pcard.picked{border-color:var(--blue);background:var(--blue-soft)}
  .pcard.approved{border-color:var(--green-line);background:#f7fcf9}
  .pcard .thumb{width:74px;height:74px;flex-shrink:0;border-radius:9px;border:1px solid var(--line);background:#fbfcfe center/contain no-repeat;overflow:hidden}
  .pcard .thumb img{width:100%;height:100%;object-fit:contain}
  .pcard .body{flex:1;min-width:0;display:flex;flex-direction:column}
  .selcorner{position:absolute;top:10px;right:10px;width:27px;height:27px;border-radius:50%;border:1.5px solid var(--ink-faint);background:#fff;display:flex;align-items:center;justify-content:center;color:transparent;font-size:15px;font-weight:800;line-height:1}
  .pcard.selectable:hover .selcorner{border-color:var(--blue)}
  .selcorner.on{background:var(--blue);border-color:var(--blue);color:#fff}
  .pcorner{position:absolute;top:10px;right:10px;font-size:9.5px;font-weight:700;padding:3px 10px;border-radius:100px}
  .pcorner.applied{background:var(--amber-soft);color:var(--amber)}
  .pcorner.approved{background:var(--green-soft);color:var(--green)}
  .ptop{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:2px;padding-right:32px}
  .pcard .rank{font-size:10px;font-weight:700;color:var(--ink-faint)}
  .pst.rejected{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:100px;background:var(--red-soft);color:var(--red)}
  .pcard .ptitle{font-size:13px;font-weight:700;line-height:1.35;color:var(--ink);text-decoration:none;display:block;margin:1px 0 5px;padding-right:32px}
  .pcard .ptitle:hover{color:var(--blue-deep);text-decoration:underline}
  .pcard .meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;font-size:11px;color:var(--ink-soft)}
  .pcard .price{font-size:14px;font-weight:700;color:var(--ink)}
  .pcard .brand{font-weight:600}
  .badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:100px;white-space:nowrap}
  .badge.adopt{background:var(--green-soft);color:var(--green)}
  .badge.check{background:var(--amber-soft);color:var(--amber)}
  .badge.hold{background:var(--gray-soft);color:var(--ink-soft)}
  .badge.src{background:var(--teal-soft);color:var(--teal)}
  .badge.ai{background:var(--purple-soft);color:var(--purple)}
  .badge.rev{background:var(--blue-soft);color:var(--blue-deep)}
  .aireason{font-size:11px;color:var(--ink-faint);margin-top:6px;line-height:1.45;display:flex;gap:5px}
  .aireason .rz{color:var(--purple);font-weight:700;flex-shrink:0}
  .who{font-size:10.5px;color:var(--ink-soft);margin-top:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .who .ini{width:16px;height:16px;border-radius:50%;background:var(--blue);color:#fff;font-size:9px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
  .who .dt{color:var(--ink-faint)}
  .fbrow{display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);flex-wrap:wrap}
  .vbtn{font-size:12px;font-weight:700;padding:4px 11px;border-radius:100px;border:1px solid var(--line);background:#fff;color:var(--ink-soft);cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:5px}
  .vbtn:hover{border-color:var(--ink-faint)}
  .vbtn.up.on{background:var(--green-soft);color:var(--green);border-color:var(--green-line)}
  .vbtn.down.on{background:var(--red-soft);color:var(--red);border-color:#f2c9cc}
  .vbtn .vn{font-size:10px;opacity:.75}
  .dbtn{font-size:11.5px;font-weight:700;padding:5px 13px;border-radius:100px;border:1px solid var(--line);background:#fff;cursor:pointer}
  .dbtn.ok{background:var(--green);color:#fff;border-color:var(--green)}
  .dbtn.ng{background:#fff;color:var(--red);border-color:#f2c9cc}
  .dbtn.wd{background:var(--gray-soft);color:var(--ink-soft)}
  .fbright{margin-left:auto;display:inline-flex;gap:6px}

  .summary{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 15px;margin:4px 0 14px;box-shadow:var(--shadow)}
  .summary .sh{font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:8px}
  .summary .chips{display:flex;gap:8px;flex-wrap:wrap}
  .pchip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink-soft);background:var(--gray-soft);border:1px solid var(--line);border-radius:100px;padding:4px 12px}
  .pchip .ini{width:17px;height:17px;border-radius:50%;background:var(--green);color:#fff;font-size:9px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
  .pchip b{color:var(--ink);font-size:14px}

  .empty{color:var(--ink-faint);font-size:14px;text-align:center;padding:44px 0;background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}
  .submitbar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);box-shadow:0 -4px 16px rgba(26,34,54,.10);padding:11px 18px;display:none;align-items:center;gap:12px;z-index:40}
  .submitbar.show{display:flex}
  .submitbar .cnt{font-size:14px;font-weight:700}.submitbar .cnt b{color:var(--blue)}
  .submitbar .go{margin-left:auto;background:var(--blue);color:#fff;border:none;border-radius:10px;padding:11px 26px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(59,111,224,.28)}
  .submitbar .clr{background:var(--gray-soft);border:1px solid var(--line);border-radius:10px;padding:11px 16px;font-size:13px;cursor:pointer;color:var(--ink-soft)}
  .gate{max-width:440px;margin:12vh auto 0;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:34px 30px;box-shadow:var(--shadow);text-align:center}
  .gate .lg{width:52px;height:52px;border-radius:50%;background:var(--ink);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;margin-bottom:14px}
  .gate h2{font-size:18px;margin-bottom:6px}
  .gate p{font-size:13px;color:var(--ink-soft);margin-bottom:18px}
  .gate button{background:var(--blue);color:#fff;border:none;font-size:14px;font-weight:600;padding:12px 24px;border-radius:10px;cursor:pointer;box-shadow:0 2px 8px rgba(59,111,224,.28)}
  .gate .err{font-size:12px;color:var(--red);background:var(--red-soft);border:1px solid #f2c9cc;border-radius:9px;padding:9px 12px;margin-top:14px}
  .hidden{display:none!important}
  #toast{position:fixed;left:50%;bottom:76px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:11px 20px;border-radius:100px;opacity:0;transition:.25s;pointer-events:none;z-index:50}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="toast"></div>

<div id="gate" class="gate hidden">
  <div class="lg">S<span style="color:#3b6fe0">.</span></div>
  <h2>商品ビュー</h2>
  <p>チームのGoogleアカウントでログインしてください。</p>
  <button id="loginBtn">Googleでログイン</button>
  <div id="gateErr" class="err hidden"></div>
</div>

<div id="app" class="wrap hidden">
  <div class="topbar">
    <span class="logomark">S<span class="d">.</span></span>
    <span class="brand">Select<span class="dot">.</span> 商品ビュー</span>
    <span id="dateLbl" class="date">—</span>
    <span id="userChip" class="userchip"></span>
  </div>
  <h1>切り口ごとの商品候補</h1>
  <p class="lead" id="lead">使いたい商品を <b>カードごとクリックして選択</b>（右上の○が✓に）→ 下の「申請する」で送信。管理者は「承認待ち」で承認します。</p>
  <div class="controls">
    <div class="tabs">
      <button class="tab on" data-v="pool">候補を選ぶ</button>
      <button class="tab" data-v="pending">承認待ち <span class="tb" id="tbPending">0</span></button>
      <button class="tab" data-v="approved">承認済み <span class="tb" id="tbApproved">0</span></button>
    </div>
    <button class="reload" id="reloadBtn" style="margin-left:auto">↻ 再読み込み</button>
    <div class="counter">
      <span class="cpill">テーマ<b id="cThemes">0</b></span>
      <span class="cpill">商品<b id="cItems">0</b></span>
    </div>
  </div>
  <div id="area"><div class="empty">読み込み中…</div></div>
</div>

<div id="submitbar" class="submitbar">
  <span class="cnt"><b id="selCnt">0</b> 件を選択中</span>
  <button class="clr" id="clrBtn">選択をクリア</button>
  <button class="go" id="goBtn">申請する →</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL = "https://jvnyavatcwxuljjujxua.supabase.co";
const SB_KEY = "sb_publishable_hbtP3WrNCJp0BUuBrDs4Ww_6x79K4uc";
const sb = supabase.createClient(SB_URL, SB_KEY);

let ME=null, CATDATE=null, ROWS=[], PV={}, PICKS={}, ROWMAP={}, PRODMAP={}, VIEW='pool';
const SEL = new Set();
const $ = id => document.getElementById(id);
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function yen(n){return (n==null||n==='')?'—':'￥'+Number(n).toLocaleString();}
function pk(t,a,asin){return t+'::'+(a||'')+'::'+asin;}
function isAdmin(){return ME && ME.role==='管理者';}
function ini(s){return (s||'?').trim().charAt(0);}
function fmtDate(s){ if(!s) return ''; try{ return new Date(s).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; } }

$('loginBtn').onclick = ()=> sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.href.split('#')[0]}});
sb.auth.onAuthStateChange((_e)=>{ if(_e==='SIGNED_IN') boot(); });

async function boot(){
  const {data:{session}} = await sb.auth.getSession();
  if(!session){ showGate(); return; }
  const email = session.user.email;
  const {data:me,error} = await sb.from('v2_member').select('*').eq('email',email).eq('active',true).maybeSingle();
  if(error){ showGate('接続エラー：'+error.message); return; }
  if(!me){ showGate('このアカウント（'+email+'）は未登録です。管理者に追加を依頼してください。'); return; }
  ME = me;
  $('gate').classList.add('hidden'); $('app').classList.remove('hidden');
  const roleCls = me.role==='管理者'?'admin':'worker';
  $('userChip').innerHTML = `<span>${esc(me.name||me.email)}</span><span class="rolebadge ${roleCls}">${esc(me.role)}</span><button id="logoutBtn">ログアウト</button>`;
  $('logoutBtn').onclick = async()=>{ await sb.auth.signOut(); location.reload(); };
  await load();
}
function showGate(msg){
  $('app').classList.add('hidden'); $('gate').classList.remove('hidden');
  const e=$('gateErr'); if(msg){e.textContent=msg;e.classList.remove('hidden');} else e.classList.add('hidden');
}

async function load(){
  $('area').innerHTML = '<div class="empty">読み込み中…</div>';
  const {data:latest,error:e0} = await sb.from('v2_product').select('catalog_date').order('catalog_date',{ascending:false}).limit(1);
  if(e0){ $('area').innerHTML = '<div class="empty">読み込みエラー：'+esc(e0.message)+'</div>'; return; }
  if(!latest||!latest.length){ $('area').innerHTML='<div class="empty">まだ商品がありません。<br>Mac側で product_fetch.py を1回走らせると、ここに候補が並びます。</div>'; return; }
  CATDATE = latest[0].catalog_date;
  $('dateLbl').innerHTML = `カタログ <b>${esc(CATDATE)}</b>`;
  const {data,error} = await sb.from('v2_product').select('*')
    .eq('catalog_date',CATDATE).order('theme').order('angle_title').order('rank');
  if(error){ $('area').innerHTML='<div class="empty">読み込みエラー：'+esc(error.message)+'</div>'; return; }
  ROWS = data||[];
  PRODMAP = {}; ROWS.forEach(r=> PRODMAP[pk(r.theme,r.angle_title,r.asin)] = r);
  SEL.clear();
  await loadVotes(); await loadPicks();
  render();
}
async function loadVotes(){
  PV = {};
  const {data} = await sb.from('v2_product_vote').select('*').eq('catalog_date',CATDATE);
  (data||[]).forEach(v=>{
    const k = pk(v.theme,v.angle_title,v.asin);
    const o = PV[k] || (PV[k]={up:0,down:0,mine:0});
    if(v.vote===1) o.up++; else if(v.vote===-1) o.down++;
    if(v.user_email===ME.email) o.mine = v.vote;
  });
}
async function loadPicks(){
  PICKS = {};
  const {data} = await sb.from('v2_product_pick').select('*').eq('catalog_date',CATDATE);
  (data||[]).forEach(p=> PICKS[pk(p.theme,p.angle_title,p.asin)] = p);
}

/* ---------- 共通パーツ ---------- */
function verdictBadge(v){
  if(v==='採用') return '<span class="badge adopt">採用</span>';
  if(v==='要確認') return '<span class="badge check">要確認</span>';
  return '<span class="badge hold">保留</span>';
}
function badges(o){
  const src = o.consensus ? `<span class="badge src">${o.consensus}源一致${o.sources?'('+esc(o.sources)+')':''}</span>` : '';
  const ai  = (o.ai_score!=null) ? `<span class="badge ai">AI適合 ${o.ai_score}</span>` : '';
  const rev = (o.review_count!=null) ? `<span class="badge rev">レビュー ${Number(o.review_count).toLocaleString()}</span>` : '';
  return `${verdictBadge(o.verdict)} ${src} ${ai} ${rev}`;
}
function thumb(u){ return `<div class="thumb">${u?`<img src="${esc(u)}" loading="lazy" alt="">`:''}</div>`; }

/* ---------- 候補ビュー（選ぶ→申請） ---------- */
function card(r){
  const key = pk(r.theme,r.angle_title,r.asin);
  ROWMAP[key] = r;
  const pv = PV[key]||{up:0,down:0,mine:0};
  const pick = PICKS[key];
  const status = pick ? pick.status : null;
  const selectable = !pick || status==='差し戻し';
  const on = SEL.has(key);
  const reason = r.ai_reason ? `<div class="aireason"><span class="rz">AI</span><span>${esc(r.ai_reason)}</span></div>` : '';
  let corner='';
  if(status==='申請') corner = `<span class="pcorner applied">申請中・${esc(pick.submitted_name||'')}</span>`;
  else if(status==='承認') corner = `<span class="pcorner approved">✓ 承認済</span>`;
  else if(selectable) corner = `<div class="selcorner ${on?'on':''}">✓</div>`;
  let ptop = `<span class="rank">#${r.rank??'-'}</span>`;
  if(status==='差し戻し') ptop += `<span class="pst rejected">差し戻し</span>`;
  const cls = 'pcard'+(selectable?' selectable':'')+(status==='承認'?' approved':'')+((on||status==='申請')?' picked':'');
  return `<div class="${cls}" data-k="${key}">
    ${thumb(r.image_url)}
    <div class="body">
      <div class="ptop">${ptop}</div>
      <a class="ptitle" href="${esc(r.url)}" target="_blank" rel="noopener noreferrer">${esc(r.title||'(無題)')}</a>
      <div class="meta"><span class="price">${yen(r.price)}</span>${r.brand?`<span class="brand">${esc(r.brand)}</span>`:''} ${badges(r)}</div>
      ${reason}
      <div class="fbrow">
        <button class="vbtn up ${pv.mine===1?'on':''}" data-a="${esc(r.asin)}" data-t="${esc(r.theme)}" data-g="${esc(r.angle_title||'')}" data-v="1">👍 <span class="vn">${pv.up||''}</span></button>
        <button class="vbtn down ${pv.mine===-1?'on':''}" data-a="${esc(r.asin)}" data-t="${esc(r.theme)}" data-g="${esc(r.angle_title||'')}" data-v="-1">👎 <span class="vn">${pv.down||''}</span></button>
      </div>
    </div>
    ${corner}
  </div>`;
}
function renderPool(){
  const byTheme = {};
  ROWS.forEach(r=>{ const th=r.theme, ag=r.angle_title||''; (byTheme[th]=byTheme[th]||{}); (byTheme[th][ag]=byTheme[th][ag]||[]).push(r); });
  let html='';
  Object.keys(byTheme).forEach((th,ti)=>{
    const angles = Object.keys(byTheme[th]);
    html += `<div class="theme-sec" style="animation-delay:${ti*40}ms"><div class="theme-head">📦 ${esc(th)} <span class="thn">切り口 ${angles.length}</span></div>`;
    angles.forEach(ag=>{
      const items = byTheme[th][ag];
      html += `<div class="angle-sec"><div class="angle-head"><span class="pip"></span>${esc(ag||'(テーマ単位)')}<span class="cnt">${items.length}件</span></div>
        <div class="pgrid">${items.map(card).join('')}</div></div>`;
    });
    html += `</div>`;
  });
  $('area').innerHTML = html || '<div class="empty">この日の商品がありません。</div>';
  document.querySelectorAll('.pcard.selectable').forEach(el=>{
    el.onclick=(e)=>{ if(e.target.closest('a,button')) return; const k=el.dataset.k; if(SEL.has(k))SEL.delete(k); else SEL.add(k); render(); };
  });
  document.querySelectorAll('.vbtn').forEach(b=> b.onclick=()=> vote(b.dataset.t,b.dataset.g,b.dataset.a,Number(b.dataset.v)));
}

/* ---------- 承認待ち / 承認済みビュー ---------- */
function pickRow(p){
  const key = pk(p.theme,p.angle_title,p.asin);
  const prod = PRODMAP[key] || {};
  const reason = prod.ai_reason ? `<div class="aireason"><span class="rz">AI</span><span>${esc(prod.ai_reason)}</span></div>` : '';
  const approved = p.status==='承認';
  let ops='';
  if(p.status==='申請' && isAdmin())
    ops += `<button class="dbtn ok" data-k="${key}" data-s="承認">承認する</button><button class="dbtn ng" data-k="${key}" data-s="差し戻し">差し戻し</button>`;
  if(approved && isAdmin())
    ops += `<button class="dbtn ng" data-k="${key}" data-s="差し戻し">承認を取消</button>`;
  if(p.status!=='承認' && (p.submitted_by===ME.email || isAdmin()))
    ops += `<button class="dbtn wd" data-k="${key}">申請取消</button>`;
  const whoLine = approved
    ? `<div class="who"><span class="ini">${esc(ini(p.submitted_name))}</span>申請 ${esc(p.submitted_name||'')} <span class="dt">${fmtDate(p.submitted_at)}</span> → 承認 ${esc(p.decided_name||'')} <span class="dt">${fmtDate(p.decided_at)}</span></div>`
    : `<div class="who"><span class="ini">${esc(ini(p.submitted_name))}</span>申請 ${esc(p.submitted_name||'')} <span class="dt">${fmtDate(p.submitted_at)}</span></div>`;
  return `<div class="pcard${approved?' approved':''}">
    ${thumb(p.image_url)}
    <div class="body">
      <a class="ptitle" href="${esc(p.url)}" target="_blank" rel="noopener noreferrer">${esc(p.title||'(無題)')}</a>
      <div class="meta"><span class="price">${yen(p.price)}</span>${p.brand?`<span class="brand">${esc(p.brand)}</span>`:''} ${badges(p)}</div>
      ${reason}
      ${whoLine}
      <div class="fbrow"><span style="font-size:11px;color:var(--ink-faint)">${esc(p.theme)}／${esc(p.angle_title||'-')}</span><span class="fbright">${ops}</span></div>
    </div>
  </div>`;
}
function renderList(status){
  const picks = Object.values(PICKS).filter(p=>p.status===status)
    .sort((a,b)=> (b.submitted_at||'').localeCompare(a.submitted_at||''));
  let head='';
  if(status==='承認'){
    const by={};
    picks.forEach(p=>{ const n=p.submitted_name||p.submitted_by||'?'; by[n]=(by[n]||0)+1; });
    const chips = Object.keys(by).sort((a,b)=>by[b]-by[a])
      .map(n=>`<span class="pchip"><span class="ini">${esc(ini(n))}</span>${esc(n)} <b>${by[n]}</b></span>`).join('');
    if(chips) head = `<div class="summary"><div class="sh">担当者別 承認済み件数（＝作るクリエイティブ数の目安）</div><div class="chips">${chips}</div></div>`;
  }
  if(!picks.length){
    $('area').innerHTML = head + `<div class="empty">${status==='申請'?'承認待ちの申請はありません。':'承認済みはまだありません。'}</div>`;
    return;
  }
  $('area').innerHTML = head + `<div class="pgrid">${picks.map(pickRow).join('')}</div>`;
  document.querySelectorAll('.dbtn.ok,.dbtn.ng').forEach(b=> b.onclick=()=> decide(b.dataset.k,b.dataset.s));
  document.querySelectorAll('.dbtn.wd').forEach(b=> b.onclick=()=> withdraw(b.dataset.k));
}

/* ---------- ルート描画 ---------- */
function render(){
  ROWMAP = {};
  const themes = new Set(ROWS.map(r=>r.theme));
  const picks = Object.values(PICKS);
  const nPending = picks.filter(p=>p.status==='申請').length;
  const nApproved = picks.filter(p=>p.status==='承認').length;
  $('cThemes').textContent = themes.size;
  $('cItems').textContent  = ROWS.length;
  $('tbPending').textContent = nPending;
  $('tbApproved').textContent = nApproved;
  document.querySelectorAll('.tab').forEach(t=> t.classList.toggle('on', t.dataset.v===VIEW));
  if(VIEW==='pool'){ $('lead').innerHTML='使いたい商品を <b>カードごとクリックして選択</b>（右上の○が✓に）→ 下の「申請する」で送信。管理者は「承認待ち」で承認します。'; renderPool(); }
  else if(VIEW==='pending'){ $('lead').innerHTML='申請された商品の一覧です。'+(isAdmin()?'<b>「承認する」で確定</b>、合わなければ「差し戻し」。':'管理者の承認待ちです。'); renderList('申請'); }
  else { $('lead').innerHTML='承認された商品の一覧です。ここに載ったものが実際に使う商品（＝クリエイティブを作る対象）です。'; renderList('承認'); }
  updateBar();
}
function updateBar(){
  $('selCnt').textContent = SEL.size;
  $('submitbar').classList.toggle('show', VIEW==='pool' && SEL.size>0);
}

/* ---------- 申請・承認・投票 ---------- */
async function submitPicks(){
  const rows = [...SEL].map(k=>{
    const r = ROWMAP[k] || PRODMAP[k];
    return {catalog_date:CATDATE, theme:r.theme, angle_title:r.angle_title||'', asin:r.asin,
      title:r.title, url:r.url, image_url:r.image_url, price:r.price, brand:r.brand,
      review_count:r.review_count, consensus:r.consensus, sources:r.sources, verdict:r.verdict, ai_score:r.ai_score,
      status:'申請', submitted_by:ME.email, submitted_name:ME.name||ME.email, submitted_at:new Date().toISOString()};
  });
  if(!rows.length) return;
  const {error} = await sb.from('v2_product_pick').upsert(rows,{onConflict:'catalog_date,theme,angle_title,asin'});
  if(error){ toast('申請エラー：'+error.message); return; }
  const n = rows.length; SEL.clear();
  await loadPicks(); render(); toast(n+'件を申請しました（承認待ちへ）');
}
async function decide(key, status){
  const p = PICKS[key]; if(!p) return;
  const patch = {status, decided_by:ME.email, decided_name:ME.name||ME.email, decided_at:new Date().toISOString()};
  const {error} = await sb.from('v2_product_pick').update(patch).eq('id',p.id);
  if(error){ toast('更新エラー：'+error.message); return; }
  await loadPicks(); render(); toast(status==='承認'?'承認しました':'差し戻しました');
}
async function withdraw(key){
  const p = PICKS[key]; if(!p) return;
  const {error} = await sb.from('v2_product_pick').delete().eq('id',p.id);
  if(error){ toast('取消エラー：'+error.message); return; }
  await loadPicks(); render(); toast('申請を取り消しました');
}
async function vote(theme, angle, asin, v){
  const key = pk(theme,angle,asin);
  const cur = PV[key]?.mine||0;
  let error;
  if(cur===v){
    ({error} = await sb.from('v2_product_vote').delete()
      .eq('user_email',ME.email).eq('catalog_date',CATDATE).eq('theme',theme).eq('angle_title',angle||'').eq('asin',asin));
  }else{
    ({error} = await sb.from('v2_product_vote').upsert(
      {user_email:ME.email,catalog_date:CATDATE,theme,angle_title:angle||'',asin,vote:v,updated_at:new Date().toISOString()},
      {onConflict:'user_email,catalog_date,theme,angle_title,asin'}));
  }
  if(error){ toast('保存エラー：'+error.message); return; }
  await loadVotes(); render(); toast(cur===v?'取り消しました':(v===1?'👍 記録しました':'👎 記録しました'));
}

document.querySelectorAll('.tab').forEach(t=> t.onclick=()=>{ VIEW=t.dataset.v; render(); });
$('reloadBtn').onclick = load;
$('goBtn').onclick = submitPicks;
$('clrBtn').onclick = ()=>{ SEL.clear(); render(); };
boot();
</script>
</body>
</html>
